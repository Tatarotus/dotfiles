# $schema = "https://yazi-rs.github.io/schemas/theme.json"

# =========================================================
# GitHub Light Sharp
# Flat TUI aesthetic inspired by:
# - github-nvim-theme
# - Neovim statuslines
# - minimalist terminal tooling
# =========================================================

# ---------------------------------------------------------
# Core Palette
# ---------------------------------------------------------

# bg         = #ffffff
# panel      = #f6f8fa
# fg         = #24292f
# muted      = #57606a
# border     = #d0d7de
# blue       = #0969da
# green      = #1a7f37
# red        = #cf222e
# purple     = #8250df
# yellow     = #bf8700
# cyan       = #0550ae

# =========================================================
# Manager
# =========================================================

[mgr]
cwd = { fg = "#0969da", bold = true }

# cleaner selection
hovered         = { reversed = true }
preview_hovered = { reversed = true }

# search
find_keyword  = { fg = "#0969da", bg = "#fff8c5", bold = true }
find_position = { fg = "#24292f", bold = true }

# marks
marker_copied   = { fg = "#1a7f37", bold = true }
marker_cut      = { fg = "#cf222e", bold = true }
marker_marked   = { fg = "#8250df", bold = true }
marker_selected = { fg = "#0969da", bold = true }

count_copied   = { fg = "#ffffff", bg = "#1a7f37" }
count_cut      = { fg = "#ffffff", bg = "#cf222e" }
count_selected = { fg = "#ffffff", bg = "#0969da" }

border_symbol = "│"
border_style  = { fg = "#d0d7de" }

[indicator]
# Overrides default rounded edges and adds the custom arrow pointer
padding = { open = "█", close = "" }

# =========================================================
# Tabs
# =========================================================

[tabs]
active   = { fg = "#ffffff", bg = "#24292f", bold = true }
inactive = { fg = "#57606a", bg = "#f6f8fa" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# =========================================================
# Mode
# =========================================================

[mode]
normal_main = { fg = "#ffffff", bg = "#24292f", bold = true }
normal_alt  = { fg = "#57606a", bg = "#f6f8fa" }

select_main = { fg = "#ffffff", bg = "#1a7f37", bold = true }
select_alt  = { fg = "#1a7f37", bg = "#f6f8fa" }

unset_main = { fg = "#ffffff", bg = "#8250df", bold = true }
unset_alt  = { fg = "#8250df", bg = "#f6f8fa" }

# =========================================================
# Status
# =========================================================

[status]
overall = { fg = "#57606a", bg = "#ffffff" }

sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#0969da", bold = true }
progress_normal = { fg = "#ffffff", bg = "#24292f" }
progress_error  = { fg = "#ffffff", bg = "#cf222e" }

perm_type  = { fg = "#0969da", bold = true }
perm_read  = { fg = "#1a7f37" }
perm_write = { fg = "#bf8700" }
perm_exec  = { fg = "#8250df" }
perm_sep   = { fg = "#d0d7de" }

# =========================================================
# Input
# =========================================================

[input]
border   = { fg = "#d0d7de" }
title    = { fg = "#24292f", bold = true }
value    = { fg = "#24292f" }
selected = { reversed = true }

# =========================================================
# Completion
# =========================================================

[completion]
border = { fg = "#d0d7de" }

active   = { reversed = true }
inactive = { fg = "#57606a" }

# =========================================================
# Pick
# =========================================================

[pick]
border = { fg = "#d0d7de" }

active   = { fg = "#24292f", bold = true }
inactive = { fg = "#57606a" }

# =========================================================
# Tasks
# =========================================================

[tasks]
border  = { fg = "#d0d7de" }
title   = { fg = "#24292f", bold = true }
hovered = { reversed = true }

# =========================================================
# Which
# =========================================================

[which]
cols = 2

mask = { bg = "#ffffff" }

cand = { fg = "#0969da", bold = true }
rest = { fg = "#57606a" }
desc = { fg = "#24292f" }

separator       = " → "
separator_style = { fg = "#d0d7de" }

# =========================================================
# Help
# =========================================================

[help]
on      = { fg = "#0969da", bold = true }
run     = { fg = "#8250df" }
desc    = { fg = "#24292f" }

hovered = { reversed = true }

footer = { fg = "#57606a", bg = "#f6f8fa" }

# =========================================================
# Notify
# =========================================================

[notify]
title_info  = { fg = "#1a7f37" }
title_warn  = { fg = "#bf8700" }
title_error = { fg = "#cf222e" }

# =========================================================
# Filetypes
# =========================================================

[filetype]
rules = [

    # directories
    { url = "*/", fg = "#0969da", bold = true },

    # symlink
    { mime = "inode/symlink", fg = "#1a7f37" },

    # executables
    { mime = "application/x-executable", fg = "#1a7f37", bold = true },

    # images
    { mime = "image/*", fg = "#bf8700" },

    # media
    { mime = "{audio,video}/*", fg = "#8250df" },

    # archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma}", fg = "#cf222e" },

    # documents
    { mime = "application/{pdf,doc,docx,rtf,vnd.*}", fg = "#0550ae" },

    # code
    { name = "*.go",   mime = "text/x-go", fg = "#0550ae" },
    { name = "*.rs",   mime = "text/x-rust", fg = "#cf222e" },
    { name = "*.c",    mime = "text/x-c", fg = "#1a7f37" },
    { name = "*.h",    mime = "text/x-c", fg = "#1a7f37" },
    { name = "*.py",   mime = "text/x-python", fg = "#0969da" },
    { name = "*.js",   mime = "text/javascript", fg = "#bf8700" },
    { name = "*.ts",   mime = "text/typescript", fg = "#0969da" },
    { name = "*.lua",  mime = "text/x-lua", fg = "#0969da" },
    { name = "*.sh",   mime = "text/x-sh", fg = "#1a7f37" },
    { name = "*.toml", mime = "text/x-toml", fg = "#57606a" },
    { name = "*.json", mime = "application/json", fg = "#57606a" },
    { name = "*.yaml", mime = "text/yaml", fg = "#57606a" },
    { name = "*.yml",  mime = "text/yaml", fg = "#57606a" },
    { name = "*.md",   mime = "text/markdown", fg = "#8250df" },
    { name = "*.norg", mime = "text/plain", fg = "#8250df" },

    # orphan links
    { mime = "inode/orphan", fg = "#cf222e" },

    # fallback
    { mime = "*/*", fg = "#24292f" },
]

# =========================================================
# Icons
# =========================================================

[icon]

prepend_dirs = [
    { name = "Desktop",   text = "󰟀", fg = "#0969da" },
    { name = "Documents", text = "󰈙", fg = "#0550ae" },
    { name = "Downloads", text = "󰉍", fg = "#0969da" },
    { name = "Music",     text = "󰝚", fg = "#8250df" },
    { name = "Pictures",  text = "󰉏", fg = "#bf8700" },
    { name = "Videos",    text = "󰈫", fg = "#8250df" },
    { name = "Projects",  text = "󰲋", fg = "#1a7f37" },
]
