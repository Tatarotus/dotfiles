# ==========================================
# Alacritty Configuration (~/.config/alacritty/alacritty.toml)
# ==========================================

[window]
decorations = "none"
opacity = 1.0

# Initial Window Dimensions
[window.dimensions]
columns = 100
lines = 28


# Inner Window Padding
[window.padding]
x = 0
y = 0

# ==========================================
# Scrolling
# ==========================================
[scrolling]
history = 10000
multiplier = 3

# ==========================================
# Font Configuration
# ==========================================
[font]
size = 18.0


# Using the exact name from your fc-list output
[font.normal]
 family = "JetBrainsMono Nerd Font"
 style = "Regular"

 [font.bold]
 family = "JetBrainsMono Nerd Font"
 style = "Bold"

 [font.italic]
 family = "JetBrainsMono Nerd Font"
 style = "Italic"


# ==========================================
# Cursor Options
# ==========================================
[cursor]
style = "Block"
unfocused_hollow = true

# ==========================================
# Color Scheme (Light Theme)
# ==========================================
[colors.primary]
background = "0xFFFFFF"
foreground = "0x24292E"

[colors.cursor]
text = "0xFFFFFF"
cursor = "0x24292E"

[colors.normal]
black   = "0x24292E"
red     = "0xD73A49"
green   = "0x28A745"
yellow  = "0xDBAB09"
blue    = "0x0366D6"
magenta = "0x6F42C1"
cyan    = "0x1B7C83"
white   = "0x6A737D"

[colors.bright]
black   = "0x586069"
red     = "0xCB2431"
green   = "0x22863A"
yellow  = "0xB08800"
blue    = "0x005CC5"
magenta = "0x5A32A3"
cyan    = "0x127B8A"
white   = "0x959DA5"

# ==========================================
# Keyboard Bindings
# ==========================================
[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "W"
mods = "Control|Shift"
action = "Quit"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullScreen"
